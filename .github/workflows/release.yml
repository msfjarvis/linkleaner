name: Build and deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}

permissions:
  packages: write
  contents: write

jobs:
  build-container:
    name: Build container (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Install Nix
      shell: bash
      run: |
        if [[ -z $(command -v nix) ]]; then
          curl --proto '=https' --tlsv1.2 -sSf -L https://install.lix.systems/lix | sh -s -- install --no-confirm --extra-conf "
            trusted-users = $(whoami)
            access-tokens = github.com=$GITHUB_TOKEN
          "
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build container image for ${{ matrix.system }}
      shell: bash
      run: |
        nix build .#container --system ${{ matrix.system }}

    - name: Upload container image artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: container-${{ matrix.system }}
        path: result
        retention-days: 1

    - name: Build GHCR container image for ${{ matrix.system }}
      shell: bash
      run: |
        nix build .#ghContainer --system ${{ matrix.system }}

    - name: Upload GHCR container image artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: gh-container-${{ matrix.system }}
        path: result
        retention-days: 1

  deploy:
    name: Deploy app
    needs: build-container
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Install Nix
      shell: bash
      run: |
        if [[ -z $(command -v nix) ]]; then
          curl --proto '=https' --tlsv1.2 -sSf -L https://install.lix.systems/lix | sh -s -- install --no-confirm --extra-conf "
            trusted-users = $(whoami)
            access-tokens = github.com=$GITHUB_TOKEN
          "
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Download container images
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: containers

    - name: Deploy to fly.io
      shell: bash
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        # Push x86_64 image
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./containers/container-x86_64-linux/result \
          docker://registry.fly.io/linkleaner:latest-amd64 \
          --dest-creds x:"$FLY_API_TOKEN"

        # Push aarch64 image
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./containers/container-aarch64-linux/result \
          docker://registry.fly.io/linkleaner:latest-arm64 \
          --dest-creds x:"$FLY_API_TOKEN"

        # Create and push a multi-arch manifest list combining both arch images
        docker login registry.fly.io --username x --password-stdin <<< "$FLY_API_TOKEN"
        docker manifest create registry.fly.io/linkleaner:latest \
          registry.fly.io/linkleaner:latest-amd64 \
          registry.fly.io/linkleaner:latest-arm64
        docker manifest push registry.fly.io/linkleaner:latest

        # Deploy using flyctl (picks the right arch from the :latest manifest)
        nix run .#flyctl deploy

    - name: Publish to GitHub Container Registry
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: |
        # Push x86_64 image
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./containers/gh-container-x86_64-linux/result \
          docker://ghcr.io/msfjarvis/linkleaner:latest-amd64 \
          --dest-creds "$GITHUB_ACTOR":"$GITHUB_TOKEN"

        # Push aarch64 image
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./containers/gh-container-aarch64-linux/result \
          docker://ghcr.io/msfjarvis/linkleaner:latest-arm64 \
          --dest-creds "$GITHUB_ACTOR":"$GITHUB_TOKEN"

        # Create and push a multi-arch manifest list combining both arch images
        docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GITHUB_TOKEN"
        docker manifest create ghcr.io/msfjarvis/linkleaner:latest \
          ghcr.io/msfjarvis/linkleaner:latest-amd64 \
          ghcr.io/msfjarvis/linkleaner:latest-arm64
        docker manifest push ghcr.io/msfjarvis/linkleaner:latest

    - name: Get changelog entry
      id: changelog_reader
      uses: mindsers/changelog-reader-action@39cdf882d8c143062ea6ac0b2a01b37e6a688179 # v2.3.0
      with:
        version: ${{ github.ref_name }}
        path: ./CHANGELOG.md

    - name: Create GitHub release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.POST_RELEASE_GH_TOKEN }}
        CHANGELOG: ${{ steps.changelog_reader.outputs.changes }}
        GH_TOKEN: ${{ github.token }}
      run: |
        NOTES_FILE="$(mktemp)"
        printf "%s\n" "${CHANGELOG}" > "${NOTES_FILE}"

        gh release create "${{ github.ref_name }}" --notes-file "${NOTES_FILE}" --title "${{ github.ref_name }}"
