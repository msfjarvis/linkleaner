# fly.toml app configuration file generated for zeppelinker on 2026-05-04T20:10:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zeppelinker'
primary_region = 'cdg'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  image = 'registry.fly.io/linkleaner:latest'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
